version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ist_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ist_db
      MYSQL_USER: ist_user
      MYSQL_PASSWORD: ist_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ist_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://ist_user:ist_password@mysql:3306/ist_db"
      JWT_SECRET: "change-this-in-production-very-long-secret"
      JWT_EXPIRES_IN: "7d"
      PORT: 4000
      NODE_ENV: production
      PYTHON_SERVICE_URL: "http://python-service:5000"
      UPLOAD_DIR: "/app/uploads"
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: ist_python
    restart: unless-stopped
    environment:
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ist_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
