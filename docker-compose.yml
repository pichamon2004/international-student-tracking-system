version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: ist_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ist_db
      MYSQL_USER: ist_user
      MYSQL_PASSWORD: ist_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ist_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "mysql://ist_user:ist_password@mysql:3306/ist_db"
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:4000"
      PYTHON_SERVICE_URL: "http://python-service:5000"
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: ist_python
    restart: unless-stopped
    environment:
      PORT: 5000
    ports:
      - "5002:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    container_name: ist_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
